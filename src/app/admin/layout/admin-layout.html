<div class="flex min-h-screen bg-gray-50">
  <aside class="fixed left-0 top-0 z-30 flex h-screen w-64 flex-col bg-gray-900 text-white">
    <div class="flex h-16 items-center border-b border-gray-700 px-6">
      <span class="text-lg font-bold tracking-wide">AJ Studio</span>
    </div>

    <nav class="flex-1 space-y-1 px-3 py-4">
      <a
        routerLink="/admin/dashboard"
        routerLinkActive="bg-gray-700 text-white"
        class="flex items-center rounded-md px-3 py-2 text-sm text-gray-300 transition hover:bg-gray-700 hover:text-white"
      >
        Dashboard
      </a>
      <a
        routerLink="/admin/users"
        routerLinkActive="bg-gray-700 text-white"
        class="flex items-center rounded-md px-3 py-2 text-sm text-gray-300 transition hover:bg-gray-700 hover:text-white"
      >
        Usuarios
      </a>
    </nav>

    <div class="border-t border-gray-700 p-3">
      <button
        (click)="logout()"
        class="flex w-full items-center rounded-md px-3 py-2 text-sm text-gray-300 transition hover:bg-gray-700 hover:text-white"
      >
        Cerrar sesión
      </button>
    </div>
  </aside>

  <div class="ml-64 flex-1">
    <router-outlet />
  </div>
</div>
