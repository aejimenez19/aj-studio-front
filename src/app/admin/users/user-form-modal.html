<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" (click)="close()">
  <div class="w-full max-w-md rounded-lg bg-white p-6 shadow-xl" (click)="$event.stopPropagation()">
    <h2 class="mb-6 text-lg font-semibold text-gray-800">{{ isEdit() ? 'Editar Usuario' : 'Crear Usuario' }}</h2>

    @if (error(); as errMsg) {
      <div class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-600">{{ errMsg }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="fullName" class="block text-sm font-medium text-gray-700">Nombre completo</label>
        <input
          id="fullName"
          type="text"
          required
          autocomplete="off"
          [ngModel]="fullName()"
          (ngModelChange)="fullName.set($event)"
          name="fullName"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="Nombre del usuario"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">Correo electrónico</label>
        <input
          id="email"
          type="email"
          required
          autocomplete="off"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="usuario@ajstudio.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
        <input
          id="password"
          type="password"
          [required]="!isEdit()"
          autocomplete="new-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          [placeholder]="isEdit() ? 'Dejar en blanco para mantener' : '********'"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Rol</label>
        <div class="mt-2 space-y-2">
          <label class="flex items-center gap-2">
            <input
              type="radio"
              name="role"
              value="ROLE_ADMIN"
              [checked]="selectedRole() === 'ROLE_ADMIN'"
              (change)="selectedRole.set('ROLE_ADMIN')"
              class="border-gray-300 text-blue-600 focus:ring-blue-500"
            />
            <span class="text-sm text-gray-700">ROLE_ADMIN</span>
          </label>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          (click)="close()"
          class="rounded-md border border-gray-300 px-4 py-2 text-sm text-gray-700 transition hover:bg-gray-50"
        >
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="saving()"
          class="rounded-md bg-blue-600 px-4 py-2 text-sm text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
        >
          @if (saving()) {
            Guardando...
          } @else {
            Guardar
          }
        </button>
      </div>
    </form>
  </div>
</div>
