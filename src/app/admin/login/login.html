<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md rounded-lg bg-white p-8 shadow-md">
    <h1 class="mb-6 text-center text-2xl font-bold text-gray-800">
      Admin - Iniciar Sesión
    </h1>

    @if (error(); as errMsg) {
      <div class="mb-4 rounded-md bg-red-50 p-3 text-sm text-red-600">
        {{ errMsg }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">
          Correo electrónico
        </label>
        <input
          id="email"
          type="email"
          required
          autocomplete="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
          placeholder="admin@ajstudio.com"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">
          Contraseña
        </label>
        <input
          id="password"
          type="password"
          required
          autocomplete="current-password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full rounded-md bg-blue-600 px-4 py-2 text-white transition hover:bg-blue-700 disabled:cursor-not-allowed disabled:opacity-50"
      >
        @if (loading()) {
          <span>Ingresando...</span>
        } @else {
          <span>Ingresar</span>
        }
      </button>
    </form>
  </div>
</div>
